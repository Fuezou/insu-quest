<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insu-Quest III (Math II)</title>
    <style>
        :root { --main-color: #00ffcc; --bg-dark: #121212; }
        body { background: var(--bg-dark); color: var(--main-color); font-family: 'Consolas', monospace; margin: 0; padding: 10px; text-align: center; }
        #container { max-width: 450px; margin: 0 auto; border: 2px solid var(--main-color); border-radius: 10px; padding: 20px; }
        #monster { font-size: 70px; margin: 20px 0; }
        #problem { font-size: 24px; margin: 20px 0; min-height: 40px; color: #fff; }
        #input-area { margin-top: 20px; }
        input[type="text"] { width: 85%; padding: 15px; font-size: 18px; background: #222; border: 1px solid var(--main-color); color: #fff; border-radius: 5px; text-align: center; margin-bottom: 10px; }
        .hint { font-size: 12px; color: #888; margin-bottom: 15px; }
        #ans-btn { background: var(--main-color); color: #000; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        #msg { height: 30px; margin-top: 15px; font-weight: bold; }
        .keyboard-helper { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .key { background: #333; padding: 8px 12px; border-radius: 3px; font-size: 14px; cursor: pointer; border: 1px solid #555; }
    </style>
</head>
<body>

<div id="container">
    <div style="display:flex; justify-content:space-between; font-size:14px;">
        <span>RANK: Math II</span>
        <span>SCORE: <span id="score">0</span></span>
    </div>
    <div id="monster">🐉</div>
    <div id="problem">Loading...</div>
    
    <div class="hint">入力例: (x+y)(x^2-xy+y^2)</div>
    
    <div class="keyboard-helper">
        <span class="key" onclick="add('^2')">^2</span>
        <span class="key" onclick="add('^3')">^3</span>
        <span class="key" onclick="add('(')">(</span>
        <span class="key" onclick="add(')')">)</span>
        <span class="key" onclick="add('x')">x</span>
        <span class="key" onclick="add('y')">y</span>
        <span class="key" onclick="add('+')">+</span>
        <span class="key" onclick="add('-')">-</span>
    </div>

    <input type="text" id="user-input" autocomplete="off" placeholder="解答を入力...">
    <button id="ans-btn" onclick="check()">CAST SPELL</button>
    <div id="msg"></div>
</div>

<script>
    let score = 0;
    let currentQ = null;

    const problems = [
        { q: "x³ + y³", a: "(x+y)(x^2-xy+y^2)" },
        { q: "x³ - y³", a: "(x-y)(x^2+xy+y^2)" },
        { q: "x³ + 8", a: "(x+2)(x^2-2x+4)" },
        { q: "x³ - 27", a: "(x-3)(x^2+3x+9)" },
        { q: "8x³ + 1", a: "(2x+1)(4x^2-2x+1)" },
        { q: "x³ + 3x²y + 3xy² + y³", a: "(x+y)^3" },
        { q: "x³ - 3x²y + 3xy² - y³", a: "(x-y)^3" },
        { q: "a³ + b³ + c³ - 3abc", a: "(a+b+c)(a^2+b^2+c^2-ab-bc-ca)" }
    ];

    function add(str) {
        const input = document.getElementById('user-input');
        input.value += str;
        input.focus();
    }

    function refresh() {
        currentQ = problems[Math.floor(Math.random() * problems.length)];
        document.getElementById('problem').innerText = currentQ.q;
        document.getElementById('user-input').value = "";
        document.getElementById('msg').innerText = "";
    }

    function check() {
        const input = document.getElementById('user-input').value.replace(/\s+/g, "");
        const ans = currentQ.a.replace(/\s+/g, "");
        const log = document.getElementById('msg');

        if(input === ans) {
            score += 100;
            document.getElementById('score').innerText = score;
            log.style.color = "#00ffcc";
            log.innerText = "SUCCESS! 次の敵が現れた！";
            setTimeout(refresh, 1000);
        } else {
            log.style.color = "#ff4444";
            log.innerText = "FAILED... 公式を確認せよ";
        }
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') check();
    });

    refresh();
</script>
</body>
</html>
