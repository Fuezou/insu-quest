<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因数分解クエスト - 大文字版</title>
    <style>
        /* スマホ向けに全体を大きく調整 */
        body { background-color: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .card { background: #16213e; border: 3px solid #e94560; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; position: relative; }
        
        h1 { color: #e94560; margin-top: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .monster { font-size: 6rem; margin: 10px 0; height: 120px; display: flex; justify-content: center; align-items: center; }
        
        /* 問題文を強調 */
        .question { font-size: 1.8rem; background: #0f3460; padding: 20px; border-radius: 12px; margin-bottom: 20px; min-height: 60px; display: flex; align-items: center; justify-content: center; color: #4ee44e; font-weight: bold; line-height: 1.2; word-break: break-all; }
        
        /* 入力エリアを巨大化 */
        input { width: 90%; padding: 15px; border-radius: 10px; border: 2px solid #4ee44e; font-size: 1.4rem; margin-bottom: 15px; text-align: center; background: #fff; color: #000; font-weight: bold; }
        
        /* ボタンを押しやすく */
        button { background: #e94560; color: white; border: none; padding: 18px 30px; border-radius: 12px; font-weight: bold; font-size: 1.3rem; cursor: pointer; width: 90%; margin-top: 5px; }
        #next { background: #4ee44e; color: #1a1a2e; display: none; }
        
        #msg { height: 2rem; margin: 15px 0; font-weight: bold; font-size: 1.1rem; }
        
        .status { font-size: 1.1rem; color: #ccc; margin-bottom: 10px; display: flex; justify-content: space-around; font-weight: bold; }
        .life { color: #ff4d4d; font-size: 1.4rem; width: 100%; margin-top: 5px; }
        
        .progress-bar { background: #0f3460; height: 15px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; }
        #progress { background: #4ee44e; height: 100%; width: 0%; transition: width 0.3s; }
        
        #mission-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; z-index: 10; color: #ffd700; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card" id="game-card">
        <div id="mission-overlay">
            <h2 id="mission-title" style="font-size:2.5rem;">LEVEL 1</h2>
            <p id="mission-text" style="font-size: 1.5rem;"></p>
            <button onclick="hideMission()" style="background:#ffd700; color:#000;">戦場へ！</button>
        </div>
        
        <h1>⚔️ 因数分解クエスト</h1>
        <div class="status">
            <span>LV: <span id="lv">1</span> / 3</span>
            <span>撃破: <span id="count">0</span> / <span id="target">3</span></span>
        </div>
        <div class="life" id="life-display">❤️ ❤️</div>
        <div class="progress-bar"><div id="progress"></div></div>
        
        <div class="monster" id="mon">👾</div>
        <div class="question" id="q">...</div>
        
        <input type="text" id="ans" placeholder="答えを入力">
        <br>
        <button id="atk-btn" onclick="check()">魔法を放つ！</button>
        <button id="next" onclick="init()">次の敵を探す</button>
        <div id="msg"></div>
    </div>

    <script>
        // 問題データ（基本+α）
        const levels = [
            { target: 3, problems: [{q:"x³+3x²+3x+1",a:"(x+1)^3"}, {q:"x³-6x²+12x-8",a:"(x-2)^3"}, {q:"x³+8",a:"(x+2)(x^2-2x+4)"}], monster: "👾" },
            { target: 4, problems: [{q:"27x³+27x²+9x+1",a:"(3x+1)^3"}, {q:"x³-27",a:"(x-3)(x^2+3x+9)"}, {q:"8+x³",a:"(x+2)(x^2-2x+4)"}, {q:"8x³-12x²+6x-1",a:"(2x-1)^3"}], monster: "👹" },
            { target: 5, problems: [{q:"8a³+b³",a:"(2a+b)(4a^2-2ab+b^2)"}, {q:"27a³-b³",a:"(3a-b)(9a^2+3ab+b^2)"}, {q:"8x³+36x²y+54xy²+27y³",a:"(2x+3y)^3"}, {q:"x³+y³",a:"(x+y)(x^2-xy+y^2)"}, {q:"a³+8b³",a:"(a+2b)(a^2-2ab+4b^2)"}], monster: "🐉" }
        ];

        let lvIndex = 0, count = 0, life = 2, cur;

        const showMission = (isGameOver = false) => {
            const overlay = document.getElementById('mission-overlay');
            if (isGameOver) {
                document.getElementById('mission-title').innerText = "💀敗北";
                document.getElementById('mission-text').innerText = "勇者の力が尽きた...";
            } else {
                document.getElementById('mission-title').innerText = `LEVEL ${lvIndex + 1}`;
                document.getElementById('mission-text').innerText = `${levels[lvIndex].target}体討伐せよ！`;
            }
            overlay.style.display = 'flex';
        };

        const hideMission = () => {
            if (life <= 0) { lvIndex = 0; count = 0; life = 2; }
            document.getElementById('mission-overlay').style.display = 'none';
            init();
        };

        const init = () => {
            if(lvIndex >= levels.length) return showEnding();
            const pool = levels[lvIndex].problems;
            cur = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('q').innerText = cur.q;
            document.getElementById('ans').value = "";
            document.getElementById('msg').innerText = "";
            document.getElementById('mon').innerText = levels[lvIndex].monster;
            document.getElementById('next').style.display = "none";
            document.getElementById('atk-btn').style.display = "block";
            updateUI();
        };

        const check = () => {
            const val = document.getElementById('ans').value.replace(/\s+/g, "").replace(/\^3/g, "³");
            const answer = cur.a.replace(/\^3/g, "³");
            const msg = document.getElementById('msg');

            if(val === answer || val === cur.a) {
                msg.innerText = "✨ 討伐成功！ ✨";
                msg.style.color = "#4ee44e";
                count++;
                life = 2;
                if(count >= levels[lvIndex].target) {
                    lvIndex++; count = 0;
                    setTimeout(showMission, 1000);
                }
                document.getElementById('mon').innerText = "💥";
                document.getElementById('atk-btn').style.display = "none";
                document.getElementById('next').style.display = "block";
            } else {
                life--;
                if (life <= 0) {
                    showMission(true);
                } else {
                    msg.innerText = "ミス！あと1回で全戻りだ！";
                    msg.style.color = "#ff4d4d";
                }
            }
            updateUI();
        };

        const updateUI = () => {
            document.getElementById('lv').innerText = Math.min(lvIndex + 1, 3);
            document.getElementById('count').innerText = count;
            document.getElementById('target').innerText = levels[Math.min(lvIndex, 2)].target;
            document.getElementById('progress').style.width = (count / levels[Math.min(lvIndex, 2)].target * 100) + "%";
            document.getElementById('life-display').innerText = "❤️".repeat(Math.max(0, life));
        };

        const showEnding = () => {
            document.getElementById('game-card').innerHTML = `
                <h1 style="color:#FFD700; font-size:2.5rem;">👑 CLEAR!</h1>
                <div style="font-size:8rem">👸✨</div>
                <p style="font-size:1.5rem">伝説の勇者、誕生！</p>
                <button onclick="location.reload()" style="background:#ffd700; color:#000;">もう一度冒険へ</button>
            `;
        };

        showMission();
    </script>
</body>
</html>
