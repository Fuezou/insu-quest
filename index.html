<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insu-Quest: RPG Mode</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; margin: 0; padding: 20px; text-align: center; }
        #game-container { max-width: 500px; margin: 0 auto; background: #2c3e50; border: 4px solid #ecf0f1; border-radius: 10px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #monster { font-size: 80px; margin: 20px 0; min-height: 100px; }
        #question-box { background: #34495e; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 5px solid #e74c3c; }
        #formula { font-size: 24px; font-weight: bold; }
        .choices { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .choice-btn { background: #ecf0f1; border: none; padding: 15px; border-radius: 5px; font-size: 18px; font-weight: bold; color: #2c3e50; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .choice-btn:active { transform: scale(0.95); background: #bdc3c7; }
        #status { margin-top: 20px; font-size: 16px; color: #f1c40f; }
        .msg { height: 24px; margin-top: 10px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">LV: <span id="lv">1</span> | 倒した数: <span id="score">0</span></div>
    <div id="monster">👾</div>
    <div id="question-box">
        <div style="font-size: 14px; color: #bdc3c7;">この式を因数分解せよ！</div>
        <div id="formula">読み込み中...</div>
    </div>
    <div class="choices" id="choices-area">
        </div>
    <div class="msg" id="message"></div>
</div>

<script>
    let score = 0;
    let lv = 1;
    const monsters = ["👾", "👹", "👻", "🐉", "🧛", "👽", "🤖"];

    function generateQuestion() {
        // x^2 + (a+b)x + ab の形
        const a = Math.floor(Math.random() * 6) + 1;
        const b = Math.floor(Math.random() * 6) + 1;
        const sum = a + b;
        const prod = a * b;
        
        const formula = `x² + ${sum}x + ${prod}`;
        const correct = `(x + ${a})(x + ${b})`;
        
        // ダミーの選択肢を作成
        const dummies = [
            `(x + ${a+1})(x + ${b-1 === 0 ? 7 : b-1})`,
            `(x - ${a})(x - ${b})`,
            `(x + ${prod})(x + 1)`
        ];
        
        const choices = [correct, ...dummies].sort(() => Math.random() - 0.5);
        
        return { formula, correct, choices };
    }

    function updateGame() {
        const q = generateQuestion();
        document.getElementById('formula').innerText = q.formula;
        document.getElementById('lv').innerText = lv;
        document.getElementById('score').innerText = score;
        document.getElementById('monster').innerText = monsters[score % monsters.length];
        
        const area = document.getElementById('choices-area');
        area.innerHTML = '';
        
        q.choices.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = text;
            btn.onclick = () => {
                if (text === q.correct) {
                    score++;
                    if (score % 5 === 0) lv++;
                    document.getElementById('message').innerText = "Excellent! 撃破！";
                    setTimeout(() => {
                        document.getElementById('message').innerText = "";
                        updateGame();
                    }, 600);
                } else {
                    document.getElementById('message').innerText = "Miss! 計算し直せ！";
                    document.getElementById('message').style.color = "#e74c3c";
                    setTimeout(() => {
                        document.getElementById('message').style.color = "#2ecc71";
                        document.getElementById('message').innerText = "";
                    }, 1000);
                }
            };
            area.appendChild(btn);
        });
    }

    // 初回起動
    updateGame();
</script>

</body>
</html>
