<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insu-Quest</title>
    <style>
        :root { --main-green: #00ff41; --bg-black: #0d0208; }
        body { background: var(--bg-black); color: var(--main-green); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #game-board { width: 90%; max-width: 400px; border: 2px solid var(--main-green); padding: 15px; border-radius: 8px; background: rgba(0, 40, 0, 0.2); }
        #status-bar { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid var(--main-green); padding-bottom: 5px; }
        #monster-area { font-size: 60px; height: 100px; display: flex; align-items: center; justify-content: center; margin: 20px 0; text-shadow: 0 0 10px var(--main-green); }
        #formula-display { font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 40px; color: #fff; }
        .choices-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .choice-btn { background: transparent; border: 1px solid var(--main-green); color: var(--main-green); padding: 15px 5px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .choice-btn:active { background: var(--main-green); color: var(--bg-black); }
        #message-log { height: 20px; margin-top: 15px; font-size: 14px; color: #fff; }
        .lv-up { color: #f1c40f; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-board">
    <div id="status-bar">
        <span>LV: <span id="val-lv">1</span></span>
        <span>EXP: <span id="val-exp">0</span></span>
        <span>NEXT: <span id="val-next">5</span></span>
    </div>
    <div id="monster-area">👾</div>
    <div style="font-size: 12px;">ENCOUNTER! FACTORIZE THIS:</div>
    <div id="formula-display">...</div>
    <div class="choices-container" id="choices-area"></div>
    <div id="message-log"></div>
</div>

<script>
    let lv = 1;
    let exp = 0;
    let nextLv = 5;
    const monsterIcons = ["👾", "💀", "👻", "👹", "🤖", "🐲", "🧛"];

    function generateQ() {
        // 基本の (x+a)(x+b) 形式
        const a = Math.floor(Math.random() * (4 + lv)) + 1;
        const b = Math.floor(Math.random() * (4 + lv)) + 1;
        const s = a + b;
        const p = a * b;
        
        const formula = `x² + ${s}x + ${p}`;
        const ans = `(x+${a})(x+${b})`;
        
        const dummies = [
            `(x+${a+1})(x+${b-1 || 7})`,
            `(x-${a})(x-${b})`,
            `(x+${p})(x+1)`,
            `(x+${s})(x+1)`
        ].filter(d => d !== ans).slice(0, 3);
        
        const choices = [ans, ...dummies].sort(() => Math.random() - 0.5);
        return { formula, ans, choices };
    }

    function initGame() {
        const q = generateQ();
        document.getElementById('formula-display').innerText = q.formula;
        document.getElementById('monster-area').innerText = monsterIcons[Math.floor(Math.random() * monsterIcons.length)];
        
        const area = document.getElementById('choices-area');
        area.innerHTML = '';
        
        q.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = c;
            btn.onclick = () => checkAns(c, q.ans);
            area.appendChild(btn);
        });
    }

    function checkAns(picked, correct) {
        const log = document.getElementById('message-log');
        if(picked === correct) {
            exp++;
            log.innerText = "CRITICAL HIT! +1 EXP";
            if(exp >= nextLv) levelUp();
            updateStatus();
            setTimeout(initGame, 500);
        } else {
            log.innerText = "MISS! TRY AGAIN";
            log.style.color = "#ff4141";
            setTimeout(() => { log.style.color = "#fff"; log.innerText = ""; }, 1000);
        }
    }

    function levelUp() {
        lv++;
        exp = 0;
        nextLv = 5 + (lv * 2);
        document.getElementById('message-log').innerText = "LEVEL UP! ATTACK UP!";
        document.getElementById('val-lv').className = 'lv-up';
        setTimeout(() => { document.getElementById('val-lv').className = ''; }, 2000);
    }

    function updateStatus() {
        document.getElementById('val-lv').innerText = lv;
        document.getElementById('val-exp').innerText = exp;
        document.getElementById('val-next').innerText = nextLv - exp;
    }

    initGame();
</script>
</body>
</html>
